version: "3.9"

services:
  # ── Redis (message broker + result backend) ──
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  # ── FastAPI Backend ──
  api:
    build:
      context: .
      target: backend
    restart: unless-stopped
    ports:
      - "6969:6969"
    env_file: backend/.env
    environment:
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ${LIBRARY_DIR:-./data/library}:/data/library
      - ${ARCHIVE_DIR:-./data/archive}:/data/archive
      - ${DOWNLOAD_DIR:-./data/downloads}:/data/downloads
      - db-data:/app/data
    depends_on:
      - redis

  # ── Celery Worker ──
  worker:
    build:
      context: .
      target: backend
    restart: unless-stopped
    command: celery -A app.worker.celery_app worker --loglevel=info --concurrency=2
    env_file: backend/.env
    environment:
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ${LIBRARY_DIR:-./data/library}:/data/library
      - ${ARCHIVE_DIR:-./data/archive}:/data/archive
      - ${DOWNLOAD_DIR:-./data/downloads}:/data/downloads
      - db-data:/app/data
    depends_on:
      - redis

  # ── Frontend (Nginx) ──
  frontend:
    build:
      context: .
      target: frontend
    restart: unless-stopped
    ports:
      - "3080:80"
    depends_on:
      - api

volumes:
  redis-data:
  db-data:
